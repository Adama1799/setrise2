name: setrise
description: A Social Video Dating Live App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Core
  dio: ^5.3.2
  get_it: ^7.6.4
  logger: ^2.0.2
  shared_preferences: ^2.2.2
  equatable: ^2.0.5
  
  # UI
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  photo_view: ^0.14.0
  
  # State Management
  provider: ^6.1.1
  
  # Utils
  intl: ^0.18.1
  path_provider: ^2.1.1
  permission_handler: ^11.0.1
  image_picker: ^1.0.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
