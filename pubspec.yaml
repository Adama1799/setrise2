name: setrise
description: Setrise - Social Video Dating Live App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  # ---- State Management ----
  flutter_riverpod: ^2.5.1        # إدارة الحالة

  # ---- Navigation ----
  go_router: ^14.2.0              # الملاحة الحديثة

  # ---- Images & UI ----
  cached_network_image: ^3.3.1    # تحميل الصور مع كاش
  shimmer: ^3.0.0                 # تأثير التحميل
  flutter_svg: ^2.0.10+1          # أيقونات SVG
  palette_generator: ^0.3.3       # استخراج لون المنتج (Vero style)

  # ---- Maps ----
  flutter_map: ^7.0.0
  flutter_map_marker_cluster: ^1.3.0
  latlong2: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # ---- الخطوط ----
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter_18pt-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Inter_18pt-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter_18pt-Light.ttf
          weight: 300
