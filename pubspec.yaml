name: setrise
description: Setrise - Social Video Dating Live App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Dependency Injection ──────────────────────────
  get_it: ^7.6.7

  # ── Network ───────────────────────────────────────
  dio: ^5.4.3+1
  connectivity_plus: ^6.0.3

  # ── Storage ───────────────────────────────────────
  shared_preferences: ^2.2.3
  hive_flutter: ^1.1.0        # ✅ أضيف — كان ناقصاً وسبب crash
  flutter_secure_storage: ^9.0.0

  # ── Map ───────────────────────────────────────────
  flutter_map: ^7.0.0
  flutter_map_marker_cluster: ^1.3.0
  latlong2: ^0.9.0

  # ── Media / Files ─────────────────────────────────
  cached_network_image: ^3.3.1
  file_picker: ^8.0.7
  image_picker: ^1.1.2

  # ── UI / Animations ───────────────────────────────
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # ── Utilities ─────────────────────────────────────
  intl: ^0.19.0
  dartz: ^0.10.1
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
