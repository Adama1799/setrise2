name: setrise

description: Setrise - Social Video Dating Live App

publish_to: 'none'

version: 1.0.0+1

environment:

  sdk: ^3.0.0

dependencies:

  flutter:

    sdk: flutter

dev_dependencies:

  flutter_test:

    sdk: flutter

  flutter_lints: ^4.0.0

flutter:

  uses-material-design: true

  assets:

    - assets/icons/

    - assets/fonts/

  fonts:

    - family: HarmonyOS

      fonts:

        - asset: assets/fonts/HarmonyOS_Sans_Thin.ttf

          weight: 100

        - asset: assets/fonts/HarmonyOS_Sans_Light.ttf

          weight: 300

        - asset: assets/fonts/HarmonyOS_Sans_Regular.ttf

          weight: 400

        - asset: assets/fonts/HarmonyOS_Sans_Medium.ttf

          weight: 500

        - asset: assets/fonts/HarmonyOS_Sans_Bold.ttf

          weight: 700

        - asset: assets/fonts/HarmonyOS_Sans_Black.ttf

          weight: 900
