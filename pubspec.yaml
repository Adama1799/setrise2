name: setrise
description: Setrise - Social Video Dating Live App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Dependency Injection ──────────────────────────
  get_it: ^7.6.7
  injectable: ^2.3.2

  # ── Navigation ────────────────────────────────────
  go_router: ^13.2.0

  # ── Network ───────────────────────────────────────
  dio: ^5.4.3+1
  cached_network_image: ^3.3.1

  # ── Map ───────────────────────────────────────────
  flutter_map: ^7.0.0
  flutter_map_marker_cluster: ^1.3.0
  latlong2: ^0.9.0

  # ── Storage ───────────────────────────────────────
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # ── Media / Files ─────────────────────────────────
  file_picker: ^8.0.7
  image_picker: ^1.1.2
  video_player: ^2.8.6

  # ── UI / Animations ───────────────────────────────
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  lottie: ^3.1.0

  # ── Utilities ─────────────────────────────────────
  intl: ^0.19.0
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.3
  dartz: ^0.10.1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  injectable_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  # fonts:
  #   - family: SF Pro
  #     fonts:
  #       - asset: assets/fonts/SF-Pro-Display-Regular.otf
  #       - asset: assets/fonts/SF-Pro-Display-Bold.otf
  #         weight: 700
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
