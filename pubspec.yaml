name: setrise
description: "SetRise - Social Delivery App"
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod: ^2.4.0

  # Dependency Injection
  get_it: ^7.6.0

  # Functional Programming
  fpdart: ^1.1.0

  # Networking
  dio: ^5.3.1

  # SVG
  flutter_svg: ^2.0.0

  # Local Storage
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.0

  # Image Caching
  cached_network_image: ^3.3.0

  # Utilities
  intl: ^0.19.0
  go_router: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  fonts:
    - family: HarmonyOS
      fonts:
        - asset: assets/fonts/HarmonyOS_Sans_Regular.ttf
          weight: 400
        - asset: assets/fonts/HarmonyOS_Sans_Medium.ttf
          weight: 500
        - asset: assets/fonts/HarmonyOS_Sans_Semibold.ttf
          weight: 600
        - asset: assets/fonts/HarmonyOS_Sans_Bold.ttf
          weight: 700
        - asset: assets/fonts/HarmonyOS_Sans_Black.ttf
          weight: 900

  assets:
    - assets/fonts/
    - assets/icons/
    - assets/images/
    - assets/animations/
    - assets/logos/

